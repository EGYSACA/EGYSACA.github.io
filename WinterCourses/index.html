<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Hieroglyph Name</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Write your name in hieroglyphs (easy)</h2>

  <input id="name" placeholder="Type your name (English letters)" />
  <button id="go">Convert</button>
  <button id="clear">Clear</button>

  <div class="cartouche">
    <div id="out" class="glyphs">𓁹</div>
  </div>

  <p class="note">
    This is a simple letter-to-symbol mapping for learning. Real tools use phonetic rules.
  </p>

  <script src="app.js"></script>
</body>
</html>
